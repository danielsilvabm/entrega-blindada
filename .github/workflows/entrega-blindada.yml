name: Entrega Blindada

on:
  push:
    branches: [ main ]

jobs:


  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install -g htmlhint stylelint stylelint-config-standard

      - run: |
          echo '{
            "extends": "stylelint-config-standard"
          }' > .stylelintrc.json

      - run: htmlhint "**/*.html"

      - run: stylelint "**/*.css" --ignore "dist/**"




  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Criar pasta dist
        run: |
          mkdir build
          cp *.html *.css build/

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist



 
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Download artefato
        uses: actions/download-artifact@v4
        with:
          name: site
          path: dist

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        uses: actions/deploy-pages@v4